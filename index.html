<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HA Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; background:#06080c; -webkit-font-smoothing:antialiased; overflow:hidden; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:4px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity:.45; } 50% { opacity:1; } }
  @keyframes breathe { 0%,100% { box-shadow:0 0 0 0 rgba(0,179,255,0); } 50% { box-shadow:0 0 26px 0 rgba(0,179,255,.22); } }
  @keyframes shimmer { 0% { transform:translateX(-120%); } 100% { transform:translateX(240%); } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.2; } }
  @keyframes scan { 0% { transform:translateY(-60px); } 100% { transform:translateY(220px); } }
  @keyframes ping { 0% { transform:scale(.5); opacity:.65; } 100% { transform:scale(3); opacity:0; } }
  @keyframes pop { from { opacity:0; transform:translateY(10px) scale(.98); } to { opacity:1; transform:none; } }
  @keyframes fadein { from { opacity:0; } to { opacity:1; } }
  #root { width:100vw; height:100vh; background:radial-gradient(120% 90% at 80% -10%,#0c1622 0%,#06080c 55%); color:#eef3f9; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; overflow:hidden; position:relative; }
  .ms { font-family:'Material Symbols Outlined'; line-height:1; }
  input[type=range]{ accent-color:#00b3ff; }
</style>
</head>
<body>
<div id="root"></div>
<input id="photoInput" type="file" accept="image/*" style="display:none">

<script>
"use strict";
(function(){
/* =====================================================================
   HOME ASSISTANT HTML DASHBOARD  —  standalone, buildless
   - Reproduces the Claude Design "HA Dashboard" (landscape) and
     "HA Dashboard portrait" (Fire-tablet portrait) prototypes.
   - Runs as a live demo out of the box (mock state matching the design).
   - Connects to a real Home Assistant over the WebSocket API when a URL +
     long-lived access token are configured (gear icon, ?hass=..&token=..,
     or localStorage). Real entity states drive the UI; taps call services.
   ===================================================================== */

  /* ---------- palette / style helpers ---------- */
  var C = { accent:'#00b3ff', green:'#00d18b', amber:'#ffae5c', red:'#ff5d5d', faint:'#4a5462', mute:'#6b7787', sub:'#8b97a8' };
  var kebab = function(k){ return k.replace(/[A-Z]/g, function(m){ return '-'+m.toLowerCase(); }); };
  function S(obj){ var out=''; for(var k in obj){ if(obj[k]==null||obj[k]==='') continue; out += kebab(k)+':'+obj[k]+';'; } return out; }
  function ms(size, col, fill, anim){
    return S({ fontFamily:"'Material Symbols Outlined'", fontSize:size+'px', lineHeight:1, color:col,
      fontVariationSettings:"'FILL' "+(fill?1:0), animation:anim||'none', flex:'none' });
  }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* =====================================================================
     ENTITY MAP  (logical key -> Home Assistant entity)
     Derived from the user's exported entity list (hass_entities).
     ===================================================================== */
  var DEVICES = {
    // lights (HA light.* group entities)
    office_light:              { id:'light.office_light',              domain:'light' },
    wardrobe_light:            { id:'light.wardrobe_light',            domain:'light' },
    master_bedroom_light:      { id:'light.master_bedroom_light',      domain:'light' },
    master_toilet_light:       { id:'light.master_toilet_light',       domain:'light' },
    master_toilet_bright_light:{ id:'light.master_toilet_bright_light',domain:'light' },
    step_light:                { id:'light.step_light',                domain:'light' },
    kitchen_light:             { id:'light.kitchen_light',             domain:'light' },
    dining_light:              { id:'light.dining_light',              domain:'light' },
    door_light:                { id:'light.door_light',                domain:'light' },
    service_yard_light:        { id:'light.service_yard_light',        domain:'light' },
    kids_room_light:           { id:'light.kids_room_light',           domain:'light' },
    hall_light:                { id:'light.hall_light',                domain:'light' },
    kids_toilet_light:         { id:'light.kids_toilet_light',         domain:'light' },
    kids_toilet_bright_light:  { id:'light.kids_toilet_bright_light',  domain:'light' },
    // fans
    master_fan:                { id:'fan.master_bedroom_fan',          domain:'fan' },
    office_fan:                { id:'fan.office_fan',                  domain:'fan' },
    kids_fan:                  { id:'fan.kids_room_fan',               domain:'fan' },
    ceiling_fan:               { id:'switch.ceiling_fan',              domain:'switch' },
    dining_fan:                { id:'climate.dining_fan',              domain:'climate' },
    // air conditioning (sensibo climate)
    ac_master:                 { id:'climate.master_bedroom',          domain:'climate' },
    ac_kids:                   { id:'climate.kids_room',               domain:'climate' },
    ac_office:                 { id:'climate.office',                  domain:'climate' },
    ac_living:                 { id:'climate.living_room',             domain:'climate' },
    // misc
    salt_lamp:                 { id:'switch.salt_lamp',                domain:'switch' },
    kids_purifier:             { id:'switch.kids_purifier',            domain:'switch' },
    frame_tv:                  { id:'media_player.robert_s_frame_tv_3',domain:'media_player' },
    car_climate:               { id:'switch.byd_a_c_on',               domain:'switch' }
  };
  // read-only sensors used across the UI
  var SENS = {
    sentry:'binary_sensor.byd_sentry_mode',
    gate:'binary_sensor.gate',
    alarm:'alarm_control_panel.blink_naquila',
    batt:'sensor.byd_battery_level', range:'sensor.byd_range', odo:'sensor.byd_odometer',
    ext_temp:'sensor.byd_exterior_temperature', charge_w:'sensor.byd_battery_power',
    charging:'binary_sensor.byd_charging', charge_time:'sensor.byd_m6_charge_remaining_time',
    car_lock:'lock.byd_lock', car_loc:'device_tracker.byd_location',
    tyre_fl:'sensor.byd_front_left_tire_pressure', tyre_fr:'sensor.byd_front_right_tire_pressure',
    tyre_rl:'sensor.byd_rear_left_tire_pressure', tyre_rr:'sensor.byd_rear_right_tire_pressure',
    nas_cpu:'sensor.nas_cpu_utilization_total', nas_ram:'sensor.nas_memory_usage_real',
    nas_temp:'sensor.nas_temperature', vol_used:'sensor.volume_1_volume_used',
    vol_space:'sensor.volume_1_used_space', nas_dl:'sensor.nas_download_throughput',
    nas_ul:'sensor.nas_upload_throughput', nas_boot:'sensor.ds1517_last_boot',
    hdd1:'sensor.hdd_1_temperature', hdd2:'sensor.hdd_2_temperature', hdd3:'sensor.hdd_3_temperature',
    hdd4:'sensor.hdd_4_temperature', hdd5:'sensor.hdd_5_temperature',
    cl_plan:'sensor.claude_pulse_plan', cl_sess:'sensor.claude_pulse_session_usage',
    cl_sess_reset:'sensor.claude_pulse_session_reset_countdown', cl_week:'sensor.claude_pulse_weekly_usage',
    cl_week_reset:'sensor.claude_pulse_weekly_reset_time', cl_pace:'sensor.claude_usage_week_usage_pace',
    aqi_out:'sensor.east_singapore_air_quality_index', temp_out:'sensor.east_singapore_temperature',
    aqi_master:'sensor.master_bedroom_fan_air_quality_index', aqi_office:'sensor.office_fan_air_quality_index',
    aqi_kids:'sensor.kids_room_fan_air_quality_index',
    hum_master:'sensor.master_bedroom_fan_humidity', hum_office:'sensor.office_fan_humidity',
    t_master:'sensor.master_bedroom_fan_temperature', t_office:'sensor.office_fan_temperature',
    t_kids:'sensor.kids_room_temperature_feels_like',
    weather:'weather.forecast_home',
    rob_phone:'sensor.roberts_iphone_16_battery_level', rob_watch:'sensor.roberts_iphone_16_roberts_iphone_16_watch_battery_level',
    fio_phone:'sensor.fionas_iphone_16_pro_fiona_s_iphone_16_pro_battery_level',
    fio_steps:'sensor.fionas_iphone_16_pro_fiona_s_iphone_16_pro_steps',
    fio_dist:'sensor.fionas_iphone_16_pro_fiona_s_iphone_16_pro_distance',
    p_robert:'person.robert', p_fiona:'person.fiona',
    st_health:'sensor.screen_time_app_health', st_rev:'sensor.screen_time_app_revision',
    st_pending:'sensor.screen_time_pending_approvals',
    park_floor:'sensor.byd_parking_floor_3', park_remarks:'sensor.byd_parking_remarks_3',
    park_server:'sensor.byd_parking_server_2', park_ts:'sensor.byd_parking_timestamp_3',
    cam_front:'camera.front_door_synology', cam_living:'camera.living_room_synology', cam_office:'camera.office'
  };
  // kids screen-time sensors (child_1 = Zayne, child_2 = Zed)
  var KID_SENS = {
    zayne:{ ipad:'sensor.screen_time_child_1_ipad_minutes', tv:'sensor.screen_time_child_1_tv_minutes', sw:'sensor.screen_time_child_1_switch_minutes', points:'sensor.screen_time_child_1_points', used:'sensor.screen_time_child_1_used', left:'sensor.screen_time_child_1_minutes_left', device:'sensor.screen_time_child_1_device', timer:'sensor.screen_time_child_1_timer_end' },
    zed:  { ipad:'sensor.screen_time_child_2_ipad_minutes', tv:'sensor.screen_time_child_2_tv_minutes', sw:'sensor.screen_time_child_2_switch_minutes', points:'sensor.screen_time_child_2_points', used:'sensor.screen_time_child_2_used', left:'sensor.screen_time_child_2_minutes_left', device:'sensor.screen_time_child_2_device', timer:'sensor.screen_time_child_2_timer_end' }
  };

  var NAS_URLS = { screentime:'https://screentime.robertnaquila.synology.me/', carpark:'https://parking.robertnaquila.synology.me/' };

  // BYD remote-control momentary buttons (HA button.press)
  var BYD_BTN = { flash:'button.byd_flash_lights', find:'button.byd_find_car', windows:'button.byd_close_windows' };

  /* =====================================================================
     MOCK fallbacks — make demo mode look identical to the prototype.
     ===================================================================== */
  var MOCK_ON = {
    office_light:true, wardrobe_light:true, master_bedroom_light:false, master_toilet_light:false, master_toilet_bright_light:false, step_light:false,
    kitchen_light:false, dining_light:false, door_light:false, service_yard_light:false,
    kids_room_light:false, hall_light:false, kids_toilet_light:false, kids_toilet_bright_light:false,
    master_fan:true, office_fan:true, kids_fan:false, ceiling_fan:true, dining_fan:false,
    ac_master:true, ac_kids:true, ac_office:true, ac_living:false,
    salt_lamp:true, kids_purifier:true, frame_tv:false, car_climate:false
  };

  /* =====================================================================
     STATE
     ===================================================================== */
  // Photos sourced from HA image serve API (matches Lovelace dashboard)
  var HA_PHOTOS = {
    robert: '/api/image/serve/b7f40d247cda9d269f01a1e549bbc325/512x512',
    fiona:  '/api/image/serve/6b2fc4aea83218d12772b86626821b04/512x512',
    byd:    '/api/image/serve/9431424ad5dd654de19c79f702fbd78d/512x512',
    zayne:  '/api/image/serve/9686457242a073bfc1432c4a99226b33/512x512',
    zed:    '/api/image/serve/e95b5311ccab59efc7dc7c235fab6185/512x512'
  };
  function loadPhotos(){ return {}; }
  var qs = new URLSearchParams(location.search);
  var layoutOverride = qs.get('layout');

  var state = {
    now: new Date(),
    tab: qs.get('tab') || 'overview',
    dialog: null,
    tyreUnit: 'kPa',
    calView: 'list',
    calNav: 0,
    fanSpeed: {},
    fanOsc: {},
    carPing: {},
    photos: loadPhotos(),
    layout: layoutOverride || (window.matchMedia('(orientation: portrait)').matches ? 'portrait' : 'landscape'),
    connected: false,
    connError: '',
    showCalCfg: false,                 // calendar visibility dialog
    on: Object.assign({}, MOCK_ON),   // logical key -> boolean
    ent: {}                            // entity_id -> { state, attributes }
  };

  /* =====================================================================
     HOME ASSISTANT WEBSOCKET CLIENT
     ===================================================================== */
  var HA = {
    cfg: null, ws: null, id: 1, pending: {}, subscribed:false, retry:0, baseUrl:'',
    load: function(){
      var url = qs.get('hass') || localStorage.getItem('ha_url') || '';
      var tok = qs.get('token') || localStorage.getItem('ha_token') || '';
      if(url) this.cfg = { url:url.replace(/\/+$/,''), token:tok };
      return this.cfg;
    },
    save: function(url, token){
      try{ localStorage.setItem('ha_url', url); localStorage.setItem('ha_token', token); }catch(e){}
      this.cfg = { url:url.replace(/\/+$/,''), token:token };
    },
    clear: function(){ try{ localStorage.removeItem('ha_url'); localStorage.removeItem('ha_token'); }catch(e){} this.cfg=null; },
    connect: function(){
      if(!this.cfg) return;
      this.baseUrl = this.cfg.url;
      var wsUrl = this.cfg.url.replace(/^http/,'ws') + '/api/websocket';
      try { this.ws = new WebSocket(wsUrl); } catch(e){ state.connError='Bad URL'; render(); return; }
      var self = this;
      this.ws.onmessage = function(ev){ self.onMessage(JSON.parse(ev.data)); };
      this.ws.onclose = function(){ state.connected=false; render(); self.retry++; if(self.cfg) setTimeout(function(){ self.connect(); }, Math.min(15000, 1000*self.retry)); };
      this.ws.onerror = function(){ state.connError='Connection error'; };
    },
    send: function(msg){ msg.id = this.id++; this.ws.send(JSON.stringify(msg)); return msg.id; },
    onMessage: function(m){
      var self = this;
      if(m.type==='auth_required'){ this.ws.send(JSON.stringify({ type:'auth', access_token:this.cfg.token })); return; }
      if(m.type==='auth_invalid'){ state.connError='Invalid token'; state.connected=false; this.cfg=null; render(); return; }
      if(m.type==='auth_ok'){
        state.connected=true; state.connError=''; this.retry=0;
        // fetch all states, then subscribe to changes
        var gid = this.send({ type:'get_states' });
        this.pending[gid] = function(res){ (res||[]).forEach(function(e){ state.ent[e.entity_id]=e; }); syncOn(); CAL.fetchKey=''; CAL.refresh(); render(); };
        this.send({ type:'subscribe_events', event_type:'state_changed' });
        render();
        return;
      }
      if(m.type==='result'){ if(this.pending[m.id]){ this.pending[m.id](m.result); delete this.pending[m.id]; } return; }
      if(m.type==='event' && m.event && m.event.event_type==='state_changed'){
        var d = m.event.data; if(d && d.new_state){ state.ent[d.entity_id]=d.new_state; syncOn(); if(d.entity_id.indexOf('calendar.')===0){ CAL.fetchKey=''; CAL.refresh(); } render(); }
      }
    },
    callService: function(domain, service, target, data){
      if(!state.connected) return;
      this.send({ type:'call_service', domain:domain, service:service, target:target||{}, service_data:data||{} });
    }
  };

  // map HA entity states into the logical on/off map
  function entOn(id, domain){
    var e = state.ent[id]; if(!e) return null;
    var s = e.state;
    if(domain==='climate') return (s && s!=='off' && s!=='unavailable' && s!=='unknown');
    if(domain==='media_player') return (s && s!=='off' && s!=='standby' && s!=='unavailable' && s!=='idle');
    return s==='on';
  }
  function syncOn(){
    if(!state.connected) return;
    for(var k in DEVICES){ var d=DEVICES[k]; var v=entOn(d.id, d.domain); if(v!==null) state.on[k]=v; }
  }

  /* ---------- entity value accessors (HA when connected, else mock) ---------- */
  function raw(id){ return state.ent[id]; }
  function val(id, fallback){ var e=state.ent[id]; if(e && e.state!=null && e.state!=='unknown' && e.state!=='unavailable') return e.state; return fallback; }
  function numv(id, fallback){ var v=val(id, null); var n=parseFloat(v); return isNaN(n)?fallback:n; }
  function attr(id, key, fallback){ var e=state.ent[id]; if(e && e.attributes && e.attributes[key]!=null) return e.attributes[key]; return fallback; }

  /* =====================================================================
     CALENDARS  (HA calendar.* entities + per-calendar visibility)
     ---------------------------------------------------------------------
     Events stream from HA's REST calendar API
     (GET /api/calendars/<entity_id>?start=&end=) for the visible period.
     When disconnected we fall back to demo calendars so the UI is live.
     ===================================================================== */
  var CAL_PALETTE = ['#00b3ff','#ff9d6c','#9b7bff','#00d18b','#ffd166','#ff6b9d','#4dd0e1','#c3f53b'];
  var DEMO_CALS = [
    { entity_id:'calendar.family', name:'Family' },
    { entity_id:'calendar.work',   name:'Work' },
    { entity_id:'calendar.kids',   name:'Kids' }
  ];
  function demoEvents(){
    var now = state.now;
    function at(off,h,m){ var d=new Date(now); d.setDate(d.getDate()+off); d.setHours(h,m,0,0); return d; }
    var dSun = (7-now.getDay())%7 || 7;                 // next Sunday
    var dMon = (8-now.getDay())%7 || 7;                 // next Monday
    return [
      { cal:'calendar.family', title:'Parent duty — Fiona',      start:at(0,18,30), end:at(0,19,30), allDay:false },
      { cal:'calendar.family', title:"Zed's 1st birthday prep",  start:at(0,20,0),  end:at(0,21,0),  allDay:false },
      { cal:'calendar.kids',   title:'Zayne — tuition',          start:at(dSun,10,0), end:at(dSun,11,30), allDay:false },
      { cal:'calendar.work',   title:'SCME team meeting',        start:at(dMon,9,0),  end:at(dMon,10,0),  allDay:false }
    ];
  }
  function normCalEvent(it, eid, col){
    var sd=it.start||{}, ed=it.end||{};
    var allDay = !!sd.date && !sd.dateTime;
    var start = new Date(sd.dateTime || sd.date);
    var end   = new Date(ed.dateTime || ed.date || sd.dateTime || sd.date);
    return { cal:eid, col:col, title:(it.summary||'(busy)'), start:start, end:end, allDay:allDay };
  }

  var CAL = {
    hidden: (function(){ try{ return JSON.parse(localStorage.getItem('ha_cal_hidden')||'{}') || {}; }catch(e){ return {}; } })(),
    events: null,        // HA-fetched events for the current range (null until first fetch)
    fetchKey: '',        // guards against refetching the same range/visibility
    loading: false,
    saveHidden: function(){ try{ localStorage.setItem('ha_cal_hidden', JSON.stringify(this.hidden)); }catch(e){} },
    all: function(){
      if(state.connected){
        var out=[]; for(var k in state.ent){ if(k.indexOf('calendar.')===0){
          out.push({ entity_id:k, name:(state.ent[k].attributes&&state.ent[k].attributes.friendly_name)||k.replace('calendar.','') }); } }
        out.sort(function(a,b){ return a.entity_id<b.entity_id?-1:(a.entity_id>b.entity_id?1:0); });
        return out;
      }
      return DEMO_CALS.slice();
    },
    colorFor: function(eid){ var a=this.all(); for(var i=0;i<a.length;i++){ if(a[i].entity_id===eid) return CAL_PALETTE[i%CAL_PALETTE.length]; } return CAL_PALETTE[0]; },
    visibleIds: function(){ var self=this; return this.all().filter(function(c){ return !self.hidden[c.entity_id]; }).map(function(c){ return c.entity_id; }); },
    toggle: function(eid){ if(this.hidden[eid]) delete this.hidden[eid]; else this.hidden[eid]=true; this.saveHidden(); this.fetchKey=''; this.refresh(); render(); },
    range: function(){
      var b=state.now, nav=state.calNav, s, e;
      if(state.calView==='month'){ s=new Date(b.getFullYear(), b.getMonth()+nav, 1); e=new Date(b.getFullYear(), b.getMonth()+nav+1, 1); }
      else if(state.calView==='day'){ s=new Date(b.getFullYear(), b.getMonth(), b.getDate()+nav); e=new Date(s); e.setDate(e.getDate()+1); }
      else { s=new Date(b.getFullYear(), b.getMonth(), b.getDate()+nav*7); e=new Date(s); e.setDate(e.getDate()+7); }
      return [s,e];
    },
    current: function(){
      var r=this.range(), s=r[0], e=r[1], self=this;
      var src = state.connected ? (this.events||[]) : demoEvents();
      return src.filter(function(ev){ return !self.hidden[ev.cal] && ev.end>s && ev.start<e; })
                .sort(function(a,b){ return a.start-b.start; });
    },
    refresh: function(){
      if(!state.connected || !HA.cfg) return;          // demo path is synthesised in current()
      var r=this.range(), s=r[0], e=r[1], ids=this.visibleIds();
      var key = s.getTime()+'|'+e.getTime()+'|'+ids.join(',');
      if(key===this.fetchKey) return;
      this.fetchKey=key; this.loading=true;
      if(ids.length===0){ this.events=[]; this.loading=false; render(); return; }
      var collected=[], remaining=ids.length, self=this;
      ids.forEach(function(eid){
        var url=HA.baseUrl+'/api/calendars/'+encodeURIComponent(eid)+'?start='+encodeURIComponent(s.toISOString())+'&end='+encodeURIComponent(e.toISOString());
        fetch(url, { headers:{ Authorization:'Bearer '+HA.cfg.token } })
          .then(function(resp){ return resp.ok ? resp.json() : []; })
          .then(function(list){ (list||[]).forEach(function(it){ collected.push(normCalEvent(it, eid, self.colorFor(eid))); }); })
          .catch(function(){})
          .then(function(){ if(--remaining===0){ self.events=collected; self.loading=false; render(); } });
      });
    }
  };

  /* =====================================================================
     ACTIONS
     ===================================================================== */
  function setTab(t){ state.tab=t; state.dialog=null; render(); }
  function openDialog(d){ state.dialog=d; render(); }
  function closeDialog(){ state.dialog=null; render(); }

  function desiredOn(key, want){
    var d = DEVICES[key]; if(!d) return;
    state.on[key] = want;                                   // optimistic
    if(!state.connected) return;
    if(d.domain==='climate') HA.callService('climate', want?'turn_on':'turn_off', { entity_id:d.id });
    else if(d.domain==='media_player') HA.callService('media_player', want?'turn_on':'turn_off', { entity_id:d.id });
    else HA.callService(d.domain, want?'turn_on':'turn_off', { entity_id:d.id });
  }
  function toggleDevice(key){ desiredOn(key, !state.on[key]); render(); }

  // mutually-exclusive toilet lights (matches the HA automation)
  var exPairs = { kids_toilet_light:'kids_toilet_bright_light', kids_toilet_bright_light:'kids_toilet_light', master_toilet_light:'master_toilet_bright_light', master_toilet_bright_light:'master_toilet_light' };
  function toggleLight(key){
    var other = exPairs[key];
    if(other){ var turnOn=!state.on[key]; desiredOn(key, turnOn); if(turnOn && state.on[other]) desiredOn(other, false); }
    else desiredOn(key, !state.on[key]);
    render();
  }

  function homeCenter(){
    var z=state.ent['zone.home'];

    return { lat:1.3404, lon:103.9540 };   // fallback matches the demo home coords
  }
  // Resolve an entity's GPS attributes into a marker offset (% from the home centre), distance, and coord text.
  function geoFrom(eid, home){
    var e=state.ent[eid]; if(!e||!e.attributes) return null;
    var lat=e.attributes.latitude, lon=e.attributes.longitude;
    if(typeof lat!=='number'||typeof lon!=='number') return null;
    var north=(lat-home.lat)*111320, east=(lon-home.lon)*111320*Math.cos(home.lat*Math.PI/180);
    function pct(m){ return Math.max(-46, Math.min(46, (m/1200)*42)); }   // ~1.2km reaches the map edge, then clamps
    return { mx:pct(east), my:-pct(north), distM:Math.sqrt(north*north+east*east),
      coords:Math.abs(lat).toFixed(4)+' '+(lat>=0?'N':'S')+', '+Math.abs(lon).toFixed(4)+' '+(lon>=0?'E':'W') };
  }

  function ensureFrames(){

  function syncFrames(V){
    var kind = (state.tab==='screentime'||state.tab==='carpark') ? state.tab : null;

      inner='<div data-act="stop" style="width:560px;max-width:92vw;background:#0c0f15;border:1px solid rgba(0,179,255,.22);border-radius:20px;overflow:hidden;animation:pop .25s ease;box-shadow:0 30px 80px rgba(0,0,0,.6);">'+
        '<div style="display:flex;align-items:center;gap:13px;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.06);"><div style="'+k.ringStyle+'">'+(k.noPhoto?'<span style="font:600 18px/1 \'Space Grotesk\';color:#9fb0c4;">'+k.glyph+'</span>':'')+'</div><div style="flex:1;"><div style="font:700 20px/1 \'Space Grotesk\';">'+k.name+'</div><div style="font:500 12px/1 \'JetBrains Mono\',monospace;color:#8b97a8;margin-top:7px;">'+esc(k.deviceLabel)+' · '+esc(k.statusLabel)+'</div></div><span data-act="dlg-close" class="ms" style="font-size:24px;color:#6b7787;cursor:pointer;">close</span></div>'+
        '<div style="padding:20px;"><div style="display:flex;gap:12px;margin-bottom:20px;"><div style="flex:1;background:rgba(0,179,255,.06);border:1px solid rgba(0,179,255,.2);border-radius:12px;padding:13px;"><div style="font:500 9px/1 \'JetBrains Mono\',monospace;color:#6fb6ff;letter-spacing:.08em;">POINTS</div><div style="font:700 24px/1 \'Space Grotesk\';margin-top:9px;">'+k.points+'</div></div><div style="flex:1;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:13px;"><div style="font:500 9px/1 \'JetBrains Mono\',monospace;color:#566;letter-spacing:.08em;">USED TODAY</div><div style="font:700 24px/1 \'Space Grotesk\';margin-top:9px;">'+k.used+'</div></div><div style="flex:1;background:rgba(255,255,255,.02);border:1px solid rgba(255,168,76,.22);border-radius:12px;padding:13px;"><div style="font:500 9px/1 \'JetBrains Mono\',monospace;color:#b78a5e;letter-spacing:.08em;">MIN LEFT</div><div style="font:700 24px/1 \'Space Grotesk\';margin-top:9px;color:#ffae5c;">'+k.left+'</div></div></div>'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;"><span style="font:600 10px/1 \'JetBrains Mono\',monospace;letter-spacing:.1em;text-transform:uppercase;color:#5a6473;">Time per device · this week</span><div style="display:flex;align-items:center;gap:11px;"><div style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:3px;border-radius:2px;background:#00b3ff;"></span><span style="font:500 9px/1 \'JetBrains Mono\',monospace;color:#8b97a8;">iPad</span></div><div style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:3px;border-radius:2px;background:#b07cff;"></span><span style="font:500 9px/1 \'JetBrains Mono\',monospace;color:#8b97a8;">TV</span></div><div style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:3px;border-radius:2px;background:#00d18b;"></span><span style="font:500 9px/1 \'JetBrains Mono\',monospace;color:#8b97a8;">Switch</span></div></div></div>'+
        '<svg viewBox="0 0 300 100" preserveAspectRatio="none" style="width:100%;height:148px;display:block;overflow:visible;"><polyline points="'+k.ipadLine+'" fill="none" stroke="#00b3ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></polyline><polyline points="'+k.tvLine+'" fill="none" stroke="#b07cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></polyline><polyline points="'+k.swLine+'" fill="none" stroke="#00d18b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></polyline></svg>'+
        '<div style="display:flex;justify-content:space-between;margin-top:8px;padding:0 2px;">'+ticks+'</div></div>'+
      '</div>';
    } else if(V.dlg.kind==='cam'){
      var c=V.camData;
      var bg = c.img ? 'background-image:url('+c.img+');background-size:cover;background-position:center;' : 'background:linear-gradient(150deg,#141d27,#0a0f15);';
      inner='<div data-act="stop" style="width:820px;max-width:92vw;background:#0c0f15;border:1px solid rgba(0,179,255,.22);border-radius:20px;overflow:hidden;animation:pop .25s ease;box-shadow:0 30px 80px rgba(0,0,0,.6);">'+
        '<div style="height:420px;position:relative;overflow:hidden;'+bg+'">'+(c.img?'':'<div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);"></div><div style="position:absolute;inset:0;background:radial-gradient(70% 60% at 50% 42%,rgba(0,179,255,.08),transparent 70%);"></div><div style="position:absolute;left:0;right:0;height:90px;background:linear-gradient(180deg,transparent,rgba(0,179,255,.16),transparent);animation:scan 5s linear infinite;"></div><span class="ms" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:64px;color:rgba(255,255,255,.1);">'+c.glyph+'</span>')+
        '<div style="position:absolute;top:14px;left:16px;display:flex;align-items:center;gap:7px;"><span style="width:8px;height:8px;border-radius:50%;background:#ff5d5d;animation:blink 1.4s ease-in-out infinite;"></span><span style="font:600 11px/1 \'JetBrains Mono\',monospace;color:#ff9d9d;letter-spacing:.1em;">REC · LIVE</span></div><span data-act="dlg-close" class="ms" style="position:absolute;top:12px;right:14px;font-size:24px;color:#cdd7e2;cursor:pointer;background:rgba(0,0,0,.4);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;">close</span><div style="position:absolute;bottom:16px;left:18px;"><div style="font:700 20px/1 \'Space Grotesk\';color:#eef3f9;text-shadow:0 1px 4px #000;">'+c.name+'</div><div style="font:500 10px/1 \'JetBrains Mono\',monospace;color:#9aa6b6;margin-top:6px;">'+esc(c.sub)+' · Synology Surveillance</div></div></div>'+
        '<div style="display:flex;align-items:center;gap:10px;padding:14px 18px;"><div data-act="nav:security" style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:11px;background:linear-gradient(150deg,rgba(0,179,255,.18),rgba(0,179,255,.05));border:1px solid rgba(0,179,255,.35);cursor:pointer;"><span class="ms" style="font-size:18px;color:#00b3ff;">videocam</span><span style="font:600 13px/1 \'Space Grotesk\';color:#bfe2ff;">Open Security page</span></div><div style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:11px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);cursor:pointer;"><span class="ms" style="font-size:18px;color:#9aa6b6;">mic</span><span style="font:600 13px/1 \'Space Grotesk\';color:#cdd7e2;">Talk</span></div><span style="margin-left:auto;font:500 10px/1 \'JetBrains Mono\',monospace;color:#566;">1080p · H.265</span></div>'+
      '</div>';
    }
    return '<div data-act="dlg-close" style="position:absolute;inset:0;background:rgba(3,5,8,.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:50;animation:fadein .2s ease;">'+inner+'</div>';
  }

  /* ---------- SETTINGS DIALOG (HA connection) ---------- */
  function settingsOverlay(){
    if(!state.showSettings) return '';
    var cfg = HA.cfg || { url:'', token:'' };
    var statusLine = state.connected ? '<span style="color:#7fe3c0;">● Connected to Home Assistant</span>'
      : (state.connError ? '<span style="color:#ffae5c;">○ '+esc(state.connError)+' — running in demo mode</span>' : '<span style="color:#8b97a8;">○ Not connected — running in demo mode</span>');
    return '<div data-act="settings-close" style="position:absolute;inset:0;background:rgba(3,5,8,.78);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:60;animation:fadein .2s ease;">'+
      '<div data-act="stop" style="width:520px;max-width:92vw;background:#0c0f15;border:1px solid rgba(0,179,255,.22);border-radius:20px;overflow:hidden;animation:pop .25s ease;box-shadow:0 30px 80px rgba(0,0,0,.6);">'+
        '<div style="display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.06);"><span class="ms" style="font-size:22px;color:#00b3ff;">settings_ethernet</span><div style="flex:1;"><div style="font:700 18px/1 \'Space Grotesk\';">Connect to Home Assistant</div><div style="font:500 11px/1.5 \'JetBrains Mono\',monospace;color:#8b97a8;margin-top:7px;">'+statusLine+'</div></div><span data-act="settings-close" class="ms" style="font-size:24px;color:#6b7787;cursor:pointer;">close</span></div>'+
        '<div style="padding:20px;display:flex;flex-direction:column;gap:14px;">'+
          '<label style="font:600 10px/1 \'JetBrains Mono\',monospace;letter-spacing:.08em;text-transform:uppercase;color:#5a6473;">HA Base URL<input id="cfgUrl" placeholder="http://homeassistant.local:8123" value="'+esc(cfg.url)+'" style="width:100%;margin-top:8px;padding:11px 13px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);color:#eef3f9;font:500 13px/1 \'JetBrains Mono\',monospace;outline:none;"></label>'+
          '<label style="font:600 10px/1 \'JetBrains Mono\',monospace;letter-spacing:.08em;text-transform:uppercase;color:#5a6473;">Long-Lived Access Token<input id="cfgTok" type="password" placeholder="Profile → Security → Long-lived tokens" value="'+esc(cfg.token)+'" style="width:100%;margin-top:8px;padding:11px 13px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);color:#eef3f9;font:500 13px/1 \'JetBrains Mono\',monospace;outline:none;"></label>'+
          '<div style="font:500 10px/1.6 \'JetBrains Mono\',monospace;color:#566;">Stored locally in this browser. Tap a device to call the matching HA service; states stream live over the WebSocket API.</div>'+
          '<div style="display:flex;gap:10px;margin-top:4px;"><div data-act="settings-save" style="flex:1;text-align:center;padding:12px;border-radius:11px;background:linear-gradient(150deg,rgba(0,179,255,.2),rgba(0,179,255,.06));border:1px solid rgba(0,179,255,.4);cursor:pointer;font:600 13px/1 \'Space Grotesk\';color:#bfe2ff;">Connect &amp; Save</div><div data-act="settings-clear" style="padding:12px 16px;border-radius:11px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);cursor:pointer;font:600 13px/1 \'Space Grotesk\';color:#cdd7e2;">Disconnect</div></div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }

  /* ---------- CALENDAR VISIBILITY DIALOG ---------- */
  function calCfgOverlay(V){
    if(!V.calCfgOpen) return '';
    var rows = V.calCals.map(function(c){
      return '<div data-act="cal-toggle:'+c.id+'" style="display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);cursor:pointer;">'+
        '<span style="width:12px;height:12px;border-radius:3px;flex:none;background:'+c.col+';'+(c.visible?'':'opacity:.25;')+'"></span>'+
        '<div style="flex:1;min-width:0;"><div style="font:600 13px/1 \'Space Grotesk\';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;'+(c.visible?'':'color:#6b7787;')+'">'+esc(c.name)+'</div><div style="font:500 9px/1 \'JetBrains Mono\',monospace;color:#566;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(c.id)+'</div></div>'+
        '<span class="ms" style="font-size:20px;color:'+(c.visible?'#00b3ff':'#3d4756')+';">'+(c.visible?'visibility':'visibility_off')+'</span>'+
      '</div>';
    }).join('');
    var empty = V.calCals.length===0 ? '<div style="font:500 11px/1.6 \'JetBrains Mono\',monospace;color:#566;padding:6px 2px;">No calendar entities found'+(V.calConnected?'.':' — connect to Home Assistant to load your calendars.')+'</div>' : '';
    var note = '<div style="font:500 10px/1.6 \'JetBrains Mono\',monospace;color:#566;margin-top:4px;">'+(V.calConnected?'Events stream from your HA calendar entities. Choices are stored locally in this browser.':'Demo calendars — connect Home Assistant to load your real calendars.')+'</div>';
    return '<div data-act="cal-cfg-close" style="position:absolute;inset:0;background:rgba(3,5,8,.78);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:60;animation:fadein .2s ease;">'+
      '<div data-act="stop" style="width:480px;max-width:92vw;background:#0c0f15;border:1px solid rgba(0,179,255,.22);border-radius:20px;overflow:hidden;animation:pop .25s ease;box-shadow:0 30px 80px rgba(0,0,0,.6);">'+
        '<div style="display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.06);"><span class="ms" style="font-size:22px;color:#00b3ff;">event</span><div style="flex:1;"><div style="font:700 18px/1 \'Space Grotesk\';">Calendars</div><div style="font:500 11px/1.5 \'JetBrains Mono\',monospace;color:#8b97a8;margin-top:7px;">Show or hide calendars</div></div><span data-act="cal-cfg-close" class="ms" style="font-size:24px;color:#6b7787;cursor:pointer;">close</span></div>'+
        '<div style="padding:18px 20px;display:flex;flex-direction:column;gap:9px;max-height:60vh;overflow-y:auto;">'+rows+empty+note+'</div>'+
      '</div>'+
    '</div>';
  }

  /* =====================================================================
     RENDER
     ===================================================================== */
  function render(){
    var V = getVals();
    var body;
    switch(state.tab){
      case 'climate': body = devicesView(V); break;
      case 'security': body = securityView(V); break;
      case 'family': body = familyView(V); break;
      case 'screentime': body = ''; break;   // rendered by the persistent frame layer
      case 'carpark': body = ''; break;       // rendered by the persistent frame layer
      default: body = (state.layout==='portrait') ? overviewPortrait(V) : overviewLandscape(V);
    }
    document.getElementById('root').innerHTML =
      topBar(V) +
      '<div style="flex:1;min-height:0;position:relative;">'+body+'</div>' +
      dialogOverlay(V) +
      calCfgOverlay(V) +
      settingsOverlay();
    syncFrames(V);
  }

  /* =====================================================================
     EVENT DELEGATION
     ===================================================================== */
  document.addEventListener('click', function(ev){
    var t = ev.target.closest('[data-act]');
    if(!t) return;
    var act = t.getAttribute('data-act');
    var i = act.indexOf(':'); var name = i<0?act:act.slice(0,i); var arg = i<0?'':act.slice(i+1);
    switch(name){
      case 'nav': setTab(arg); break;
      case 'open': setTab(arg); break;
      case 'toggle': toggleDevice(arg); break;
      case 'toggle-light': toggleLight(arg); break;
      case 'scene': arg==='away'?sceneAway():sceneSleep(); break;
      case 'tyre': cycleTyre(); break;
      case 'cal-view': state.calView=arg; state.calNav=0; CAL.refresh(); render(); break;
      case 'cal-prev': state.calNav--; CAL.refresh(); render(); break;
      case 'cal-next': state.calNav++; CAL.refresh(); render(); break;
      case 'cal-cfg': state.showCalCfg=true; render(); break;
      case 'cal-cfg-close': state.showCalCfg=false; render(); break;
      case 'cal-toggle': CAL.toggle(arg); break;
      case 'dlg-map': openDialog({kind:'map', id:arg}); break;
      case 'dlg-screen': openDialog({kind:'screen', id:arg}); break;
      case 'dlg-cam': openDialog({kind:'cam', id:arg}); break;
      case 'dlg-close': closeDialog(); break;
      case 'upload': uploadPhoto(arg); break;
      case 'fan-osc': state.fanOsc[arg]=!state.fanOsc[arg]; render(); break;
      case 'car-btn': pressCarButton(arg); break;
      case 'settings': state.showSettings=true; render(); break;
      case 'settings-close': state.showSettings=false; render(); break;
      case 'settings-save': {
        var url=(document.getElementById('cfgUrl')||{}).value||''; var tok=(document.getElementById('cfgTok')||{}).value||'';
        if(url){ HA.save(url.trim(), tok.trim()); state.showSettings=false; state.connError=''; if(HA.ws){ try{HA.ws.close();}catch(e){} } HA.retry=0; HA.connect(); render(); }
        break; }
      case 'settings-clear': {
        HA.clear(); state.connected=false; if(HA.ws){ try{HA.ws.close();}catch(e){} HA.ws=null; }
        state.on = Object.assign({}, MOCK_ON); state.ent={}; state.showSettings=false; render(); break; }
      case 'stop': ev.stopPropagation(); break;
    }
  });
  // fan speed slider (input event)
  document.addEventListener('input', function(ev){
    var sl = ev.target.closest('[data-speed]'); if(!sl) return;
    state.fanSpeed[sl.getAttribute('data-speed')] = +sl.value; render();
  });

  /* =====================================================================
     BOOT
     ===================================================================== */
  // keep clock fresh
  setInterval(function(){ state.now=new Date(); CAL.refresh(); render(); }, 30000);
  // re-evaluate layout on rotation (unless overridden)
  if(!layoutOverride){
    window.matchMedia('(orientation: portrait)').addEventListener('change', function(e){ state.layout = e.matches?'portrait':'landscape'; render(); });
  }
  // refresh camera snapshots periodically when connected (entity_picture is signed & short-lived)
  setInterval(function(){ if(state.connected){ var ids=[SENS.cam_front,SENS.cam_living,SENS.cam_office]; var any=false; ids.forEach(function(id){ if(state.ent[id]) any=true; }); if(any) render(); } }, 12000);

  HA.load();
  render();
  if(HA.cfg) HA.connect();
})();
</script>
</body>
</html>
