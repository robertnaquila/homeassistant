<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HA Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; background:#06080c; -webkit-font-smoothing:antialiased; overflow:hidden; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:4px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity:.45; } 50% { opacity:1; } }
  @keyframes breathe { 0%,100% { box-shadow:0 0 0 0 rgba(0,179,255,0); } 50% { box-shadow:0 0 26px 0 rgba(0,179,255,.22); } }
  @keyframes shimmer { 0% { transform:translateX(-120%); } 100% { transform:translateX(240%); } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.2; } }
  @keyframes scan { 0% { transform:translateY(-60px); } 100% { transform:translateY(220px); } }
  @keyframes ping { 0% { transform:scale(.5); opacity:.65; } 100% { transform:scale(3); opacity:0; } }
  @keyframes pop { from { opacity:0; transform:translateY(10px) scale(.98); } to { opacity:1; transform:none; } }
  @keyframes fadein { from { opacity:0; } to { opacity:1; } }
  #root { width:100vw; height:100vh; background:radial-gradient(120% 90% at 80% -10%,#0c1622 0%,#06080c 55%); color:#eef3f9; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; overflow:hidden; position:relative; }
  .ms { font-family:'Material Symbols Outlined'; line-height:1; }
  input[type=range]{ accent-color:#00b3ff; }
</style>
</head>
<body>
<div id="root"></div>
<input id="photoInput" type="file" accept="image/*" style="display:none">

"use strict";
(function(){

     "HA Dashboard portrait" (Fire-tablet portrait) prototypes.
   - Runs as a live demo out of the box (mock state matching the design).

     long-lived access token are configured (gear icon, ?hass=..&token=..,
     or localStorage). Real entity states drive the UI; taps call services.
   ===================================================================== */

  /* ---------- palette / style helpers ---------- */

  function ms(size, col, fill, anim){
    return S({ fontFamily:"'Material Symbols Outlined'", fontSize:size+'px', lineHeight:1, color:col,
      fontVariationSettings:"'FILL' "+(fill?1:0), animation:anim||'none', flex:'none' });
  }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* =====================================================================
     HOME ASSISTANT WEBSOCKET CLIENT
     ===================================================================== */
  // Baked-in defaults so a fresh device connects without re-entering them.
  // (Override anytime via the settings dialog or ?hass=&token= query params.)
  var DEFAULT_HASS  = 'https://hassio.robertnaquila.synology.me';
  var DEFAULT_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJhNmI5MDM5ZjJkOTI0NzBlOTc0OGU4MGJmOTcyNzQ3MSIsImlhdCI6MTc4MTkzNTkzNiwiZXhwIjoyMDk3Mjk1OTM2fQ._rZUVVfg-OAT7_QFQecDF2h1YNlOgi_qw3H7UkH4bkw';
  var HA = {
    cfg: null, ws: null, id: 1, pending: {}, subscribed:false, retry:0, baseUrl:'',
    load: function(){
      var url = qs.get('hass') || localStorage.getItem('ha_url') || DEFAULT_HASS;
      var tok = qs.get('token') || localStorage.getItem('ha_token') || DEFAULT_TOKEN;
      if(url) this.cfg = { url:url.replace(/\/+$/,''), token:tok };
      return this.cfg;
    },
    save: function(url, token){
      try{ localStorage.setItem('ha_url', url); localStorage.setItem('ha_token', token); }catch(e){}
      this.cfg = { url:url.replace(/\/+$/,''), token:token };
    },
    clear: function(){ try{ localStorage.removeItem('ha_url'); localStorage.removeItem('ha_token'); }catch(e){} this.cfg=null; },
    connect: function(){
      if(!this.cfg) return;
      this.baseUrl = this.cfg.url;
      var wsUrl = this.cfg.url.replace(/^http/,'ws') + '/api/websocket';
      try { this.ws = new WebSocket(wsUrl); } catch(e){ state.connError='Bad URL'; render(); return; }
      var self = this;
      this.ws.onmessage = function(ev){ self.onMessage(JSON.parse(ev.data)); };
      this.ws.onclose = function(){ state.connected=false; render(); self.retry++; if(self.cfg) setTimeout(function(){ self.connect(); }, Math.min(15000, 1000*self.retry)); };
      this.ws.onerror = function(){ state.connError='Connection error'; };
    },
    send: function(msg){ msg.id = this.id++; this.ws.send(JSON.stringify(msg)); return msg.id; },
    onMessage: function(m){
      var self = this;
      if(m.type==='auth_required'){ this.ws.send(JSON.stringify({ type:'auth', access_token:this.cfg.token })); return; }
      if(m.type==='auth_invalid'){ state.connError='Invalid token'; state.connected=false; this.cfg=null; render(); return; }
      if(m.type==='auth_ok'){
        state.connected=true; state.connError=''; this.retry=0;
        // fetch all states, then subscribe to changes
        var gid = this.send({ type:'get_states' });
        this.pending[gid] = function(res){ (res||[]).forEach(function(e){ state.ent[e.entity_id]=e; }); syncOn(); CAL.fetchKey=''; CAL.refresh(); render(); };
        var uid = this.send({ type:'auth/current_user' });   // identify the logged-in account holder
        this.pending[uid] = function(res){ if(res){ state.haUser={ id:res.id, name:res.name }; render(); } };
        this.send({ type:'subscribe_events', event_type:'state_changed' });
        render();
        return;
      }
      if(m.type==='result'){ if(this.pending[m.id]){ this.pending[m.id](m.result); delete this.pending[m.id]; } return; }
      if(m.type==='event' && m.event && m.event.event_type==='state_changed'){
        var d = m.event.data; if(d && d.new_state){ state.ent[d.entity_id]=d.new_state; syncOn(); if(d.entity_id.indexOf('calendar.')===0){ CAL.fetchKey=''; CAL.refresh(); } render(); }
      }
    },
    callService: function(domain, service, target, data){
      if(!state.connected) return;
      this.send({ type:'call_service', domain:domain, service:service, target:target||{}, service_data:data||{} });
    }
  };

  // map HA entity states into the logical on/off map
  function entOn(id, domain){
    var e = state.ent[id]; if(!e) return null;
    var s = e.state;
    if(domain==='climate') return (s && s!=='off' && s!=='unavailable' && s!=='unknown');
    if(domain==='media_player') return (s && s!=='off' && s!=='standby' && s!=='unavailable' && s!=='idle');
    return s==='on';
  }
  function syncOn(){
    if(!state.connected) return;
    for(var k in DEVICES){ var d=DEVICES[k]; var v=entOn(d.id, d.domain); if(v!==null) state.on[k]=v; }
    // reflect real fan speed (percentage 0-100 -> 1-10) and oscillation from HA
    FAN_KEYS.forEach(function(k){ var d=DEVICES[k]; if(!d||d.domain!=='fan') return; var e=state.ent[d.id]; if(!e||!e.attributes) return;
      if(typeof e.attributes.percentage==='number') state.fanSpeed[k]=Math.max(1,Math.min(10,Math.round(e.attributes.percentage/10)));
      if(typeof e.attributes.oscillating==='boolean') state.fanOsc[k]=e.attributes.oscillating; });
    // reflect AC target temperature from HA
    AC_KEYS.forEach(function(k){ var e=state.ent[DEVICES[k].id]; if(!e||!e.attributes) return;
      if(typeof e.attributes.temperature==='number') state.acTemp[k]=e.attributes.temperature; });
  }

  /* ---------- entity value accessors (HA when connected, else mock) ---------- */
  function raw(id){ return state.ent[id]; }
  function val(id, fallback){ var e=state.ent[id]; if(e && e.state!=null && e.state!=='unknown' && e.state!=='unavailable') return e.state; return fallback; }
  function numv(id, fallback){ var v=val(id, null); var n=parseFloat(v); return isNaN(n)?fallback:n; }
  function attr(id, key, fallback){ var e=state.ent[id]; if(e && e.attributes && e.attributes[key]!=null) return e.attributes[key]; return fallback; }

  /* =====================================================================
     CALENDARS  (HA calendar.* entities + per-calendar visibility)
     ---------------------------------------------------------------------
     Events stream from HA's REST calendar API
     (GET /api/calendars/<entity_id>?start=&end=) for the visible period.
     When disconnected we fall back to demo calendars so the UI is live.
     ===================================================================== */
  var CAL_PALETTE = ['#00b3ff','#ff9d6c','#9b7bff','#00d18b','#ffd166','#ff6b9d','#4dd0e1','#c3f53b'];
  var DEMO_CALS = [
    { entity_id:'calendar.family', name:'Family' },
    { entity_id:'calendar.work',   name:'Work' },
    { entity_id:'calendar.kids',   name:'Kids' }
  ];
  function demoEvents(){
    var now = state.now;
    function at(off,h,m){ var d=new Date(now); d.setDate(d.getDate()+off); d.setHours(h,m,0,0); return d; }
    var dSun = (7-now.getDay())%7 || 7;                 // next Sunday
    var dMon = (8-now.getDay())%7 || 7;                 // next Monday
    return [
      { cal:'calendar.family', title:'Parent duty — Fiona',      start:at(0,18,30), end:at(0,19,30), allDay:false },
      { cal:'calendar.family', title:"Zed's 1st birthday prep",  start:at(0,20,0),  end:at(0,21,0),  allDay:false },
      { cal:'calendar.kids',   title:'Zayne — tuition',          start:at(dSun,10,0), end:at(dSun,11,30), allDay:false },
      { cal:'calendar.work',   title:'SCME team meeting',        start:at(dMon,9,0),  end:at(dMon,10,0),  allDay:false }
    ];
  }
  function normCalEvent(it, eid, col){
    var sd=it.start||{}, ed=it.end||{};
    var allDay = !!sd.date && !sd.dateTime;
    var start = new Date(sd.dateTime || sd.date);
    var end   = new Date(ed.dateTime || ed.date || sd.dateTime || sd.date);
    return { cal:eid, col:col, title:(it.summary||'(busy)'), start:start, end:end, allDay:allDay };
  }

  var CAL = {
    hidden: (function(){ try{ return JSON.parse(localStorage.getItem('ha_cal_hidden')||'{}') || {}; }catch(e){ return {}; } })(),
    events: null,        // HA-fetched events for the current range (null until first fetch)
    fetchKey: '',        // guards against refetching the same range/visibility
    loading: false,
    saveHidden: function(){ try{ localStorage.setItem('ha_cal_hidden', JSON.stringify(this.hidden)); }catch(e){} },
    all: function(){
      if(state.connected){
        var out=[]; for(var k in state.ent){ if(k.indexOf('calendar.')===0){
          out.push({ entity_id:k, name:(state.ent[k].attributes&&state.ent[k].attributes.friendly_name)||k.replace('calendar.','') }); } }
        out.sort(function(a,b){ return a.entity_id<b.entity_id?-1:(a.entity_id>b.entity_id?1:0); });
        return out;
      }
      return DEMO_CALS.slice();
    },
    colorFor: function(eid){ var a=this.all(); for(var i=0;i<a.length;i++){ if(a[i].entity_id===eid) return CAL_PALETTE[i%CAL_PALETTE.length]; } return CAL_PALETTE[0]; },
    visibleIds: function(){ var self=this; return this.all().filter(function(c){ return !self.hidden[c.entity_id]; }).map(function(c){ return c.entity_id; }); },
    toggle: function(eid){ if(this.hidden[eid]) delete this.hidden[eid]; else this.hidden[eid]=true; this.saveHidden(); this.fetchKey=''; this.refresh(); render(); },
    range: function(){
      var b=state.now, nav=state.calNav, s, e;
      if(state.calView==='month'){ s=new Date(b.getFullYear(), b.getMonth()+nav, 1); e=new Date(b.getFullYear(), b.getMonth()+nav+1, 1); }
      else if(state.calView==='day'){ s=new Date(b.getFullYear(), b.getMonth(), b.getDate()+nav); e=new Date(s); e.setDate(e.getDate()+1); }
      else { s=new Date(b.getFullYear(), b.getMonth(), b.getDate()+nav*7); e=new Date(s); e.setDate(e.getDate()+7); }
      return [s,e];
    },
    current: function(){
      var r=this.range(), s=r[0], e=r[1], self=this;
      var src = state.connected ? (this.events||[]) : demoEvents();
      return src.filter(function(ev){ return !self.hidden[ev.cal] && ev.end>s && ev.start<e; })
                .sort(function(a,b){ return a.start-b.start; });
    },
    refresh: function(){
      if(!state.connected || !HA.cfg) return;          // demo path is synthesised in current()
      var r=this.range(), s=r[0], e=r[1], ids=this.visibleIds();
      var key = s.getTime()+'|'+e.getTime()+'|'+ids.join(',');
      if(key===this.fetchKey) return;
      this.fetchKey=key; this.loading=true;
      if(ids.length===0){ this.events=[]; this.loading=false; render(); return; }
      var collected=[], remaining=ids.length, self=this;
      ids.forEach(function(eid){
        var url=HA.baseUrl+'/api/calendars/'+encodeURIComponent(eid)+'?start='+encodeURIComponent(s.toISOString())+'&end='+encodeURIComponent(e.toISOString());
        fetch(url, { headers:{ Authorization:'Bearer '+HA.cfg.token } })
          .then(function(resp){ return resp.ok ? resp.json() : []; })
          .then(function(list){ (list||[]).forEach(function(it){ collected.push(normCalEvent(it, eid, self.colorFor(eid))); }); })
          .catch(function(){})
          .then(function(){ if(--remaining===0){ self.events=collected; self.loading=false; render(); } });
      });
    }
  };

  // Resolve an entity's GPS attributes into a marker offset (% from the home centre), distance, and coord text.
  function geoFrom(eid, home){
    var e=state.ent[eid]; if(!e||!e.attributes) return null;
    var lat=e.attributes.latitude, lon=e.attributes.longitude;
    if(typeof lat!=='number'||typeof lon!=='number') return null;
    var north=(lat-home.lat)*111320, east=(lon-home.lon)*111320*Math.cos(home.lat*Math.PI/180);
    function pct(m){ return Math.max(-46, Math.min(46, (m/1200)*42)); }   // ~1.2km reaches the map edge, then clamps
    return { mx:pct(east), my:-pct(north), distM:Math.sqrt(north*north+east*east),
      coords:Math.abs(lat).toFixed(4)+' '+(lat>=0?'N':'S')+', '+Math.abs(lon).toFixed(4)+' '+(lon>=0?'E':'W') };
  }

  function render(){
    var V = getVals();
    var body;
    switch(state.tab){
      case 'climate': body = devicesView(V); break;
      case 'security': body = securityView(V); break;
      case 'family': body = familyView(V); break;
      case 'screentime': body = ''; break;   // rendered by the persistent frame layer
      case 'carpark': body = ''; break;       // rendered by the persistent frame layer
      default: body = (state.layout==='portrait') ? overviewPortrait(V) : overviewLandscape(V);
    }
    document.getElementById('root').innerHTML =
      topBar(V) +
      '<div style="flex:1;min-height:0;position:relative;">'+body+'</div>' +
      dialogOverlay(V) +
      calCfgOverlay(V) +
      settingsOverlay();
    syncFrames(V);
  }

  /* =====================================================================
     EVENT DELEGATION
     ===================================================================== */
  document.addEventListener('click', function(ev){
    var t = ev.target.closest('[data-act]');
    if(!t) return;
    var act = t.getAttribute('data-act');
    var i = act.indexOf(':'); var name = i<0?act:act.slice(0,i); var arg = i<0?'':act.slice(i+1);
    switch(name){
      case 'nav': setTab(arg); break;
      case 'open': setTab(arg); break;
      case 'toggle': toggleDevice(arg); break;
      case 'toggle-light': toggleLight(arg); break;
      case 'scene': arg==='away'?sceneAway():sceneSleep(); break;
      case 'tyre': cycleTyre(); break;
      case 'cal-view': state.calView=arg; state.calNav=0; CAL.refresh(); render(); break;
      case 'cal-prev': state.calNav--; CAL.refresh(); render(); break;
      case 'cal-next': state.calNav++; CAL.refresh(); render(); break;
      case 'cal-cfg': state.showCalCfg=true; render(); break;
      case 'cal-cfg-close': state.showCalCfg=false; render(); break;
      case 'cal-toggle': CAL.toggle(arg); break;
      case 'dlg-map': openDialog({kind:'map', id:arg}); break;
      case 'dlg-screen': openDialog({kind:'screen', id:arg}); break;
      case 'dlg-cam': openDialog({kind:'cam', id:arg}); break;
      case 'dlg-close': closeDialog(); break;
      case 'upload': uploadPhoto(arg); break;
      case 'fan-osc': setFanOsc(arg, !state.fanOsc[arg]); break;
      case 'ac-temp': { var ap=arg.split(':'); setAcTemp(ap[0], ap[1]==='up'?1:-1); break; }
      case 'car-btn': pressCarButton(arg); break;
      case 'settings': state.showSettings=true; render(); break;
      case 'settings-close': state.showSettings=false; render(); break;
      case 'settings-save': {
        var url=(document.getElementById('cfgUrl')||{}).value||''; var tok=(document.getElementById('cfgTok')||{}).value||'';
        if(url){ HA.save(url.trim(), tok.trim()); state.showSettings=false; state.connError=''; if(HA.ws){ try{HA.ws.close();}catch(e){} } HA.retry=0; HA.connect(); render(); }
        break; }
      case 'settings-clear': {
        HA.clear(); state.connected=false; if(HA.ws){ try{HA.ws.close();}catch(e){} HA.ws=null; }
        state.on = Object.assign({}, MOCK_ON); state.ent={}; state.showSettings=false; render(); break; }
      case 'stop': ev.stopPropagation(); break;
    }
  });
  // fan speed slider: the native thumb tracks the drag; we only sync state here
  // (re-rendering on every 'input' would rebuild the DOM and kill the drag).
  document.addEventListener('input', function(ev){
    var sl = ev.target.closest('[data-speed]'); if(!sl) return;
    state.fanSpeed[sl.getAttribute('data-speed')] = +sl.value;
  });
  // on release: commit the value (HA service call) and re-render to reflect it
  document.addEventListener('change', function(ev){
    var sl = ev.target.closest('[data-speed]'); if(!sl) return;
    setFanSpeed(sl.getAttribute('data-speed'), +sl.value); render();
  });

  /* =====================================================================
     BOOT
     ===================================================================== */
  // keep clock fresh
  setInterval(function(){ state.now=new Date(); CAL.refresh(); render(); }, 30000);
  // re-evaluate layout on rotation (unless overridden)
  if(!layoutOverride){
    window.matchMedia('(orientation: portrait)').addEventListener('change', function(e){ state.layout = e.matches?'portrait':'landscape'; render(); });
  }
  // refresh camera snapshots periodically when connected (entity_picture is signed & short-lived)
  setInterval(function(){ if(state.connected){ var ids=[SENS.cam_front,SENS.cam_living,SENS.cam_office]; var any=false; ids.forEach(function(id){ if(state.ent[id]) any=true; }); if(any) render(); } }, 12000);

  HA.load();
  render();
  if(HA.cfg) HA.connect();
})();
</script>
</body>
</html>
